<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; padding: 15px; box-sizing: border-box; }
        .header { border-bottom: 2px solid #00ffb4; padding-bottom: 5px; margin-bottom: 10px; }
        .header h1 { font-size: 16px; color: #00ffb4; margin: 0; letter-spacing: 1px; }
        
        .section { flex: 1; min-height: 0; display: flex; flex-direction: column; margin-bottom: 15px; border-left: 2px solid #00ffb4; padding-left: 10px; }
        .cat-title { font-size: 11px; color: #00ffb4; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        
        .rank-list { flex: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: space-around; }
        .rank-item { font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 1px 0; display: flex; }
        .rank-item span { color: #00ffb4; font-weight: bold; width: 22px; }
        
        .insight-box { background: rgba(0,255,180,0.1); border: 1px solid rgba(0,255,180,0.4); padding: 8px; font-size: 10px; line-height: 1.4; color: #ddd; white-space: pre-wrap; }
        .insight-label { color: #00ffb4; font-size: 9px; font-weight: bold; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>VERTICAL VISION TREND</h1></div>
        <div id="content" style="flex: 1; display: flex; flex-direction: column;"></div>
    </div>
    <script>
        fetch('./data.json?t=' + Date.now()).then(res => res.json()).then(data => {
            const content = document.getElementById('content');
            const cats = [{id: "0", name: "Overall Trends"}, {id: "25", name: "Advertising & Marketing"}];
            cats.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'section';
                const items = data.trends[cat.id].slice(0, 10).map((t, i) => 
                    `<div class="rank-item"><span>${i+1}</span>${t}</div>`
                ).join('');
                section.innerHTML = `
                    <div class="cat-title">${cat.name}</div>
                    <div class="rank-list">${items}</div>
                    <div class="insight-box"><span class="insight-label">シニアプランナー解説</span>${data.insights[cat.id]}</div>
                `;
                content.appendChild(section);
            });
        });
    </script>
</body>
</html>
